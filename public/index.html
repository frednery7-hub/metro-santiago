<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metro Santiago</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--text:#e8e8f0;--muted:#6b6b80;--accent:#c8ff00;--accent2:#00c8ff;--danger:#ff4444}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(200,255,0,.04) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(0,200,255,.04) 0%,transparent 60%),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px)}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 24px 80px}
header{padding:40px 0 28px;border-bottom:1px solid var(--border);margin-bottom:36px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:16px}
.logo-icon{width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:#000;flex-shrink:0}
.logo h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,5vw,40px);letter-spacing:3px;line-height:1}
.logo span{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px}
.header-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:right;line-height:1.9}
.live{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:10px;letter-spacing:1px}
.live-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:var(--surface2);padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;padding:10px;background:transparent;border:none;border-radius:7px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s}
.tab.active{background:var(--surface);color:var(--text)}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.panel-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.panel-title::after{content:'';flex:1;height:1px;background:var(--border)}
.input-group{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:8px}
.field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.field-wrap{position:relative}
.field input{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,255,0,.08)}
.field input::placeholder{color:var(--muted)}
.field input.valid{border-color:var(--accent)}
.field input.invalid{border-color:var(--danger)}
.field-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-height:14px}
.field-hint.ok{color:var(--accent)}
.field-hint.err{color:var(--danger)}
.swap-btn{width:44px;height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:22px;flex-shrink:0}
.swap-btn:hover{border-color:var(--accent);color:var(--accent);transform:rotate(180deg)}
.options-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.chip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:rgba(200,255,0,.08);border-color:var(--accent);color:var(--accent)}
.chip input{display:none}
.btn-search{width:100%;padding:16px;background:var(--accent);color:#000;border:none;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;transition:all .2s}
.btn-search:hover{background:#d4ff33;transform:translateY(-1px);box-shadow:0 8px 24px rgba(200,255,0,.2)}
.ac-list{position:absolute;z-index:100;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-top:4px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.5);width:100%;display:none}
.ac-item{padding:10px 16px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s}
.ac-item:hover,.ac-item.focused{background:rgba(200,255,0,.08)}
.ac-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 5px;border-radius:4px;flex-shrink:0}
#result{display:none}
.stats-row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:20px}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);line-height:1}
.stat-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.period{font-family:'DM Mono',monospace;font-size:10px;padding:6px 12px;border-radius:6px;letter-spacing:1px;align-self:flex-start}
.period-pico{background:rgba(255,68,68,.15);color:#ff6666;border:1px solid rgba(255,68,68,.3)}
.period-normal{background:rgba(200,255,0,.1);color:var(--accent);border:1px solid rgba(200,255,0,.3)}
.period-baixo{background:rgba(0,200,255,.1);color:var(--accent2);border:1px solid rgba(0,200,255,.3)}
.timeline{position:relative;padding-left:32px}
.timeline::before{content:'';position:absolute;left:10px;top:16px;bottom:16px;width:2px;background:var(--border)}
.t-node{position:relative;display:flex;align-items:center;gap:14px;padding:10px 0}
.t-node::before{content:'';position:absolute;left:-26px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);z-index:1;background:#888}
.t-node.big::before{width:14px;height:14px;left:-27px}
.t-name{font-size:15px;font-weight:500;flex:1}
.t-name.dim{color:var(--muted);font-size:13px;font-weight:400}
.line-pill{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:5px;letter-spacing:1px}
.dir-block{padding:5px 0}
.dir-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px}
.dir-text strong{color:var(--text);font-size:11px}
.inter-toggle{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:4px 10px;background:var(--surface2);border-radius:5px;cursor:pointer;border:none;margin:4px 0}
.inter-list{padding:4px 0;display:none}
.inter-list.open{display:block}
.inter-item{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:3px 0;display:flex;align-items:center;gap:8px}
.inter-item::before{content:'·';color:var(--border);font-size:18px;line-height:1}
.transfer-block{margin:4px 0 4px -32px;padding:10px 14px 10px 44px;background:rgba(200,255,0,.04);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;display:flex;align-items:center;gap:10px}
.transfer-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:1px}
.alert-block{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.alert-item{padding:10px 14px;background:rgba(255,68,68,.06);border:1px solid rgba(255,68,68,.2);border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:#ff8888;display:flex;gap:10px}
.acc-block{margin-top:12px;padding:12px 16px;background:rgba(0,200,255,.05);border:1px solid rgba(0,200,255,.15);border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--accent2);display:flex;gap:10px}
.h-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.h-item:hover{border-color:var(--accent);background:rgba(200,255,0,.04)}
.h-route{flex:1;display:flex;align-items:center;gap:8px;font-size:13px}
.h-sep{color:var(--muted);font-size:12px}
.h-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-align:right;line-height:1.7}
.h-del{width:28px;height:28px;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.h-del:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,68,68,.1)}
.empty{text-align:center;padding:32px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:1px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
.legend-item{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.st-chip{font-family:'DM Mono',monospace;font-size:10px;padding:4px 8px;border-radius:5px;cursor:pointer;display:inline-block;margin:3px;transition:opacity .15s}
.st-chip:hover{opacity:.7}
.fav-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.fav-btn:hover{border-color:#f5a800;color:#f5a800}
.fav-btn.active{border-color:#f5a800;color:#f5a800;background:rgba(245,168,0,.08)}
.sys-strip{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.sys-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.sys-info strong{color:var(--text)}
.line-dots{display:flex;gap:6px}
.ldot{width:8px;height:8px;border-radius:50%}
.loading{display:none;text-align:center;padding:24px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:2px}
.loading.show{display:block}
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);z-index:999;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
@media(max-width:600px){.input-group{grid-template-columns:1fr}.swap-btn{margin-top:0;width:100%}header{flex-direction:column;align-items:flex-start}.header-meta{text-align:left}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-icon">MTR</div>
      <div>
        <h1>METRO NAVIGATOR</h1>
        <span>Santiago de Chile · Sistema Integrado</span>
      </div>
    </div>
    <div class="header-meta">
      <div class="live"><span class="live-dot"></span> OPERACIONAL</div>
      <div id="clock">--:--</div>
      <div id="op-hours">–</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('rota')">Rota</button>
    <button class="tab" onclick="switchTab('historico')">Histórico</button>
    <button class="tab" onclick="switchTab('linhas')">Linhas</button>
  </div>

  <div id="tab-rota">
    <div class="sys-strip">
      <div class="sys-info" id="sys-info">Carregando sistema…</div>
      <div class="line-dots" id="line-dots"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Planejador de Rota</div>
      <div class="input-group">
        <div class="field">
          <label>Origem</label>
          <div class="field-wrap">
            <input type="text" id="inp-o" placeholder="Nome ou sigla…" autocomplete="off" oninput="onInput('o')" onkeydown="onKey(event,'o')">
            <div class="ac-list" id="ac-o"></div>
          </div>
          <div class="field-hint" id="hint-o">Digite o nome ou sigla</div>
        </div>
        <button class="swap-btn" onclick="swap()">⇄</button>
        <div class="field">
          <label>Destino</label>
          <div class="field-wrap">
            <input type="text" id="inp-d" placeholder="Nome ou sigla…" autocomplete="off" oninput="onInput('d')" onkeydown="onKey(event,'d')">
            <div class="ac-list" id="ac-d"></div>
          </div>
          <div class="field-hint" id="hint-d">Digite o nome ou sigla</div>
        </div>
      </div>
      <div class="options-row">
        <label class="chip" id="chip-acc"><input type="checkbox" id="opt-acc" onchange="toggleChip('chip-acc')"> ♿ Acessibilidade</label>
        <label class="chip" id="chip-fast"><input type="checkbox" id="opt-fast" onchange="toggleChip('chip-fast')"> ⚡ Rota mais rápida</label>
        <label class="chip active" id="chip-alert"><input type="checkbox" id="opt-alert" checked onchange="toggleChip('chip-alert')"> ⚠️ Alertas</label>
      </div>
      <button class="btn-search" onclick="buscar()">CALCULAR ROTA</button>
    </div>
    <div class="loading" id="loading">⟳ &nbsp;CALCULANDO ROTA…</div>
    <div class="panel" id="result">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <div class="stats-row" id="stats"></div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <span class="period" id="period-badge"></span>
          <button class="fav-btn" id="fav-btn" onclick="toggleFav()">☆ Favorito</button>
        </div>
      </div>
      <div id="timeline"></div>
      <div id="extra"></div>
    </div>
  </div>

  <div id="tab-historico" style="display:none">
    <div class="panel"><div class="panel-title">Recentes</div><div id="hist-list"></div></div>
    <div class="panel"><div class="panel-title">Favoritos</div><div id="fav-list"></div></div>
  </div>

  <div id="tab-linhas" style="display:none">
    <div class="panel">
      <div class="panel-title">Sistema de Linhas</div>
      <div class="legend" id="legend"></div>
      <div id="lines-detail"></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
let SISTEMA_DATA=null,lastSearch=null,acIdx={o:-1,d:-1};

async function boot(){
  try{
    const r=await fetch('/api/sistema');
    SISTEMA_DATA=await r.json();
    document.getElementById('sys-info').innerHTML=`Metro de Santiago · <strong>${SISTEMA_DATA.linhas.length} linhas · ${SISTEMA_DATA.totalEstacoes} estações</strong>`;
    document.getElementById('line-dots').innerHTML=SISTEMA_DATA.linhas.map(l=>`<div class="ldot" style="background:${l.cor}" title="${l.nome}"></div>`).join('');
    document.getElementById('op-hours').textContent=`${SISTEMA_DATA.operacao.abertura} – ${SISTEMA_DATA.operacao.fechamento}`;
  }catch{document.getElementById('sys-info').textContent='Servidor offline — rode: npm start';}
}

function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
tick();setInterval(tick,10000);

async function onInput(side){
  const inp=document.getElementById(`inp-${side}`);
  const ac=document.getElementById(`ac-${side}`);
  const hint=document.getElementById(`hint-${side}`);
  const val=inp.value.trim();
  inp.classList.remove('valid','invalid');
  hint.className='field-hint';hint.textContent='Digite o nome ou sigla';
  if(val.length<2){ac.style.display='none';return;}
  try{
    const r=await fetch(`/api/sugestoes?q=${encodeURIComponent(val)}&limite=7`);
    const sugs=await r.json();
    if(sugs.length){
      ac.innerHTML=sugs.map(item=>{
        const badges=item.linhas.map(l=>`<span class="ac-badge" style="background:${item.cores[l]}33;color:${item.cores[l]}">${l}</span>`).join('');
        return `<div class="ac-item" onmousedown="pick('${side}','${item.nome.replace(/'/g,"\\'")}'">${badges} ${item.nome}</div>`;
      }).join('');
      ac.style.display='block';acIdx[side]=-1;
    }else ac.style.display='none';
    const c=await fetch(`/api/estacao?q=${encodeURIComponent(val)}`);
    const est=await c.json();
    if(est.encontrada){hint.textContent='✓ '+est.nome;hint.className='field-hint ok';inp.classList.add('valid');}
    else{hint.textContent='Estação não encontrada';hint.className='field-hint err';inp.classList.add('invalid');}
  }catch{}
}

function onKey(e,side){
  const ac=document.getElementById(`ac-${side}`);
  const items=ac.querySelectorAll('.ac-item');
  if(e.key==='ArrowDown'){acIdx[side]=Math.min(acIdx[side]+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('focused',i===acIdx[side]));e.preventDefault();}
  else if(e.key==='ArrowUp'){acIdx[side]=Math.max(acIdx[side]-1,-1);items.forEach((el,i)=>el.classList.toggle('focused',i===acIdx[side]));e.preventDefault();}
  else if(e.key==='Enter'){if(acIdx[side]>=0&&items[acIdx[side]])items[acIdx[side]].dispatchEvent(new Event('mousedown'));else buscar();e.preventDefault();}
  else if(e.key==='Escape')ac.style.display='none';
}

function pick(side,nome){
  document.getElementById(`inp-${side}`).value=nome;
  document.getElementById(`ac-${side}`).style.display='none';
  const hint=document.getElementById(`hint-${side}`);
  hint.textContent='✓ '+nome;hint.className='field-hint ok';
  document.getElementById(`inp-${side}`).classList.add('valid');
}

document.addEventListener('click',()=>{
  document.getElementById('ac-o').style.display='none';
  document.getElementById('ac-d').style.display='none';
});

function swap(){
  const o=document.getElementById('inp-o').value;
  const d=document.getElementById('inp-d').value;
  document.getElementById('inp-o').value=d;
  document.getElementById('inp-d').value=o;
  onInput('o');onInput('d');
}

function toggleChip(id){document.getElementById(id).classList.toggle('active');}

async function buscar(){
  const ov=document.getElementById('inp-o').value.trim();
  const dv=document.getElementById('inp-d').value.trim();
  if(!ov||!dv){toast('⚠ Preencha origem e destino');return;}
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').style.display='none';
  try{
    const r=await fetch('/api/rota',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({origem:ov,destino:dv,modo:document.getElementById('opt-fast').checked?'rapida':'paradas',acessivel:document.getElementById('opt-acc').checked})
    });
    const data=await r.json();
    if(!r.ok){toast('❌ '+data.erro);return;}
    lastSearch=data;addHistory(data);renderResult(data);
  }catch{toast('❌ Erro ao conectar ao servidor');}
  finally{document.getElementById('loading').classList.remove('show');}
}

function renderResult(d){
  const perLabel={pico:'⚡ Horário de Pico',normal:'✅ Normal',baixo:'🌙 Reduzido'};
  document.getElementById('stats').innerHTML=`
    <div><div class="stat-val">${d.tempo}</div><div class="stat-lbl">Min estimados</div></div>
    <div><div class="stat-val">${d.numParadas}</div><div class="stat-lbl">Paradas</div></div>
    <div><div class="stat-val">${d.numBaldeacoes}</div><div class="stat-lbl">Baldeações</div></div>`;
  const pb=document.getElementById('period-badge');
  pb.textContent=perLabel[d.periodo];pb.className=`period period-${d.periodo}`;
  let html='<div class="timeline">';
  d.segmentos.forEach((seg,si)=>{
    const pill=`<span class="line-pill" style="background:${seg.cor}22;color:${seg.cor};border:1px solid ${seg.cor}44">${seg.linha}</span>`;
    const isLast=si===d.segmentos.length-1;
    html+=`<div class="t-node big" data-cor="${seg.cor}"><div class="t-name">${seg.estacoes[0]}</div>${pill}</div>`;
    html+=`<div class="dir-block"><div class="dir-text">↓ sentido <strong>${seg.terminal.toUpperCase()}</strong></div></div>`;
    if(seg.intermediarias.length){
      const uid=`il_${si}`;
      html+=`<button class="inter-toggle" onclick="toggleInter('${uid}')">${seg.intermediarias.length} parada${seg.intermediarias.length>1?'s':''} intermediária${seg.intermediarias.length>1?'s':''} ▸</button>
      <div class="inter-list" id="${uid}">${seg.intermediarias.map(e=>`<div class="inter-item">${e}</div>`).join('')}</div>`;
    }
    if(seg.estacoes.length>1){
      const ultima=seg.estacoes[seg.estacoes.length-1];
      html+=`<div class="t-node big" data-cor="${seg.cor}"><div class="t-name ${isLast?'':'dim'}">${ultima}</div>${!isLast?pill:''}</div>`;
    }
    if(!isLast){
      const prox=d.segmentos[si+1];
      html+=`<div class="transfer-block"><span>🔄</span><span class="transfer-text">BALDEAÇÃO → ${prox.linha} · ~4 min</span></div>`;
    }
  });
  html+='</div>';
  document.getElementById('timeline').innerHTML=html;
  let styleEl=document.getElementById('dyn-styles');
  if(!styleEl){styleEl=document.createElement('style');styleEl.id='dyn-styles';document.head.appendChild(styleEl);}
  styleEl.textContent=d.segmentos.map((seg,si)=>
    `#timeline .timeline > div:nth-child(${si*5+1})::before,
     #timeline .timeline > div:nth-child(${si*5+4})::before { background: ${seg.cor} !important; }`
  ).join('\n');
  let extra='';
  if(document.getElementById('opt-alert').checked&&d.alertas.length){
    extra+='<div class="alert-block">'+d.alertas.map(a=>`<div class="alert-item"><span>⚠</span><span>${a.estacao}: ${a.mensagem}</span></div>`).join('')+'</div>';
  }
  if(document.getElementById('opt-acc').checked){
    extra+=d.restricoesAcessibilidade.length
      ?`<div class="acc-block"><span>♿</span><span>Sem elevador confirmado: ${d.restricoesAcessibilidade.join(', ')}</span></div>`
      :`<div class="acc-block"><span>♿</span><span>Sem restrições de acessibilidade identificadas.</span></div>`;
  }
  document.getElementById('extra').innerHTML=extra;
  const favs=loadFavs();
  const isFav=favs.some(f=>f.origem===d.origem&&f.destino===d.destino);
  const fb=document.getElementById('fav-btn');
  fb.textContent=isFav?'★ Favorito':'☆ Favorito';fb.className='fav-btn'+(isFav?' active':'');
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'});
}

function toggleInter(id){
  const el=document.getElementById(id);el.classList.toggle('open');
  const btn=el.previousElementSibling;const open=el.classList.contains('open');
  btn.textContent=btn.textContent.replace(open?'▸':'▾',open?'▾':'▸');
}

function loadFavs(){try{return JSON.parse(localStorage.getItem('mtr_favs')||'[]');}catch{return[];}}
function saveFavs(f){try{localStorage.setItem('mtr_favs',JSON.stringify(f));}catch{}}
function loadHist(){try{return JSON.parse(localStorage.getItem('mtr_hist')||'[]');}catch{return[];}}
function saveHist(h){try{localStorage.setItem('mtr_hist',JSON.stringify(h.slice(0,15)));}catch{}}

function addHistory(d){
  const h=loadHist();
  h.unshift({origem:d.origem,destino:d.destino,tempo:d.tempo,paradas:d.numParadas,ts:Date.now()});
  saveHist(h);
}

function toggleFav(){
  if(!lastSearch)return;
  const{origem,destino,tempo,numParadas}=lastSearch;
  const favs=loadFavs();const idx=favs.findIndex(f=>f.origem===origem&&f.destino===destino);
  if(idx>=0){favs.splice(idx,1);toast('Removido dos favoritos');}
  else{favs.unshift({origem,destino,tempo,paradas:numParadas});toast('★ Adicionado aos favoritos');}
  saveFavs(favs);const isFav=idx<0;
  const fb=document.getElementById('fav-btn');
  fb.textContent=isFav?'★ Favorito':'☆ Favorito';fb.className='fav-btn'+(isFav?' active':'');
  if(document.getElementById('tab-historico').style.display!=='none')renderHistory();
}

function renderHistory(){
  const h=loadHist();
  document.getElementById('hist-list').innerHTML=h.length
    ?h.map((x,i)=>`<div class="h-item" onclick="loadRoute('${x.origem}','${x.destino}')">
      <div class="h-route">${x.origem}<span class="h-sep">→</span>${x.destino}</div>
      <div class="h-meta">${x.tempo}min · ${x.paradas} paradas<br>${new Date(x.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
      <button class="h-del" onclick="delH(event,${i})">✕</button></div>`).join('')
    :'<div class="empty">Nenhuma busca recente</div>';
  const f=loadFavs();
  document.getElementById('fav-list').innerHTML=f.length
    ?f.map((x,i)=>`<div class="h-item" onclick="loadRoute('${x.origem}','${x.destino}')">
      <div class="h-route">★ ${x.origem}<span class="h-sep">→</span>${x.destino}</div>
      <div class="h-meta">${x.tempo}min · ${x.paradas} paradas</div>
      <button class="h-del" onclick="delF(event,${i})">✕</button></div>`).join('')
    :'<div class="empty">Nenhum favorito salvo</div>';
}

function delH(e,i){e.stopPropagation();const h=loadHist();h.splice(i,1);saveHist(h);renderHistory();}
function delF(e,i){e.stopPropagation();const f=loadFavs();f.splice(i,1);saveFavs(f);renderHistory();toast('Favorito removido');}
function loadRoute(o,d){document.getElementById('inp-o').value=o;document.getElementById('inp-d').value=d;switchTab('rota');setTimeout(buscar,80);}

function renderLinhas(){
  if(!SISTEMA_DATA)return;
  document.getElementById('legend').innerHTML=SISTEMA_DATA.linhas.map(l=>`<div class="legend-item"><div class="legend-dot" style="background:${l.cor}"></div><span>${l.nome} · ${l.total} est.</span></div>`).join('');
  document.getElementById('lines-detail').innerHTML=SISTEMA_DATA.linhas.map(l=>`
    <div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="width:4px;height:22px;background:${l.cor};border-radius:2px"></div>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px">${l.nome}</span>
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${l.inicio} ↔ ${l.fim}</span>
      </div>
      <div>${l.estacoes.map(e=>{
        const outras=SISTEMA_DATA.linhas.filter(ll=>ll.id!==l.id&&ll.estacoes.includes(e));
        const isT=outras.length>0;
        return `<span class="st-chip" style="background:${isT?l.cor+'22':'var(--surface2)'};border:1px solid ${isT?l.cor+'44':'var(--border)'};color:${isT?l.cor:'var(--muted)'}" onclick="pick('o','${e}');switchTab('rota')" title="${isT?'Transf: '+outras.map(x=>x.id).join(', '):e}">${e}${isT?' ⟲':''}</span>`;
      }).join('')}</div>
    </div>`).join('');
}

function switchTab(t){
  ['rota','historico','linhas'].forEach(id=>document.getElementById(`tab-${id}`).style.display=id===t?'block':'none');
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['rota','historico','linhas'][i]===t));
  if(t==='historico')renderHistory();
  if(t==='linhas')renderLinhas();
}

function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

boot();
</script>
</body>
</html>
